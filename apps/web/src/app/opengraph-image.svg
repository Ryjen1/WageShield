<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="WageShield">
  <title>WageShield — Recover stolen wages, without revealing identity.</title>
  <defs>
    <radialGradient id="og-halo" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.01)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <pattern id="og-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.7" fill="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#07080D"/>
  <rect width="1200" height="630" fill="url(#og-grid)"/>
  <circle cx="600" cy="350" r="380" fill="url(#og-halo)"/>

  <!-- Top: mark + wordmark lockup -->
  <g transform="translate(80 70)" fill="none">
    <circle cx="20" cy="20" r="18" stroke="#F6F7F9" stroke-width="1.3"/>
    <path d="M10 14 L14.6 27.5 L20 17.5 L25.4 27.5 L30 14" stroke="#F6F7F9" stroke-width="1.3" stroke-linejoin="miter" stroke-linecap="square"/>
    <rect x="7" y="19.4" width="26" height="1.5" fill="#F6F7F9"/>
  </g>
  <text
    x="130"
    y="98"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-weight="500"
    font-size="22"
    letter-spacing="3.6"
    fill="#F6F7F9"
  >WAGESHIELD</text>

  <!-- Eyebrow micro-label -->
  <text
    x="80"
    y="240"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-weight="400"
    font-size="13"
    letter-spacing="4"
    fill="#8B91A3"
  >CONFIDENTIAL WAGE-THEFT CLAIMS · FHENIX COFHE</text>

  <!-- Headline -->
  <text
    x="80"
    y="340"
    font-family="Inter, system-ui, sans-serif"
    font-weight="500"
    font-size="72"
    letter-spacing="-1.8"
    fill="#F6F7F9"
  >Recover stolen wages,</text>
  <text
    x="80"
    y="425"
    font-family="Inter, system-ui, sans-serif"
    font-weight="500"
    font-size="72"
    letter-spacing="-1.8"
    fill="#F6F7F9"
  >without revealing <tspan font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-weight="400">identity.</tspan></text>

  <!-- Subtle stat row at the bottom -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="80" y="520" font-size="18" font-weight="500" fill="#8B91A3">
      $50B/yr stolen · &lt;1% of victims file · 75% of low-wage workers affected
    </text>
  </g>
  <text
    x="80"
    y="565"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-size="12"
    letter-spacing="3"
    fill="#5a6378"
  >LIVE ON ARBITRUM SEPOLIA · FHENIX COFHE TESTNET</text>
</svg>
