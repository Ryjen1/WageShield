<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="WageShield">
  <title>WageShield — Confidential Wage-Theft Claims</title>
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1a1d27"/>
      <stop offset="100%" stop-color="#07080d"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.6" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- Rounded-square background, suitable for use as an avatar with corner-rounding -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <rect width="512" height="512" rx="80" fill="url(#dots)"/>

  <!-- Mark, centered horizontally, in the upper half -->
  <g transform="translate(192 110) scale(2.0)" fill="none">
    <circle cx="32" cy="32" r="29" stroke="#F6F7F9" stroke-width="1.8"/>
    <path d="M16 22 L23.5 44 L32 28 L40.5 44 L48 22" stroke="#F6F7F9" stroke-width="1.8" stroke-linejoin="miter" stroke-linecap="square"/>
    <rect x="11" y="31" width="42" height="3" fill="#F6F7F9"/>
  </g>

  <!-- Wordmark below -->
  <text
    x="256"
    y="380"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-weight="500"
    font-size="40"
    letter-spacing="7"
    fill="#F6F7F9"
    text-anchor="middle"
  >WAGESHIELD</text>

  <!-- Subtitle eyebrow -->
  <text
    x="256"
    y="420"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-weight="400"
    font-size="13"
    letter-spacing="4.5"
    fill="#8B91A3"
    text-anchor="middle"
  >CONFIDENTIAL · FHENIX COFHE</text>
</svg>
