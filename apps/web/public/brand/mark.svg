<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="WageShield mark" fill="none">
  <title>WageShield</title>
  <!--
    Monochrome editorial mark.
    A thin-stroke geometric glyph: a circle boundary with an inscribed shield-W
    cut by a single horizontal "redaction bar". The bar is the visual idea —
    redaction across an underlying identifier. The W beneath survives the bar,
    intact but obscured.
  -->
  <!-- Circle boundary -->
  <circle cx="32" cy="32" r="29" stroke="currentColor" stroke-width="1.5"/>
  <!-- The "W" — four diagonals -->
  <path
    d="M16 22 L23.5 44 L32 28 L40.5 44 L48 22"
    stroke="currentColor"
    stroke-width="1.5"
    stroke-linejoin="miter"
    stroke-linecap="square"
  />
  <!-- Redaction bar across the middle -->
  <rect x="11" y="31" width="42" height="2.5" fill="currentColor"/>
</svg>
