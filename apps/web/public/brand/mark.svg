<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="WageShield mark">
  <title>WageShield</title>
  <defs>
    <linearGradient id="ws-shield" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5168E3"/>
      <stop offset="1" stop-color="#2C3DA3"/>
    </linearGradient>
  </defs>
  <!-- Shield silhouette -->
  <path
    d="M32 4 L56 12 V32 C56 46 45.5 56 32 60 C18.5 56 8 46 8 32 V12 Z"
    fill="url(#ws-shield)"
  />
  <!-- Encrypted-handle motif: three connected nodes inside the shield -->
  <!-- Top node -->
  <circle cx="32" cy="20" r="3.5" fill="#E0E7FF"/>
  <!-- Bottom-left node -->
  <circle cx="22" cy="38" r="3.5" fill="#E0E7FF"/>
  <!-- Bottom-right node -->
  <circle cx="42" cy="38" r="3.5" fill="#E0E7FF"/>
  <!-- Connecting strokes (encrypted handle graph) -->
  <path
    d="M32 23.5 L22 34.5 M32 23.5 L42 34.5 M22 38 L42 38"
    stroke="#E0E7FF"
    stroke-width="1.6"
    stroke-linecap="round"
    fill="none"
    opacity="0.85"
  />
  <!-- Centre dot — represents the encrypted aggregate -->
  <circle cx="32" cy="32" r="1.8" fill="#34D399"/>
</svg>
