<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" role="img" aria-label="WageShield banner">
  <title>WageShield — Recover stolen wages. Without revealing who you are.</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F1320"/>
      <stop offset="1" stop-color="#1B2240"/>
    </linearGradient>
    <linearGradient id="shield" x1="160" y1="100" x2="160" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C8DF0"/>
      <stop offset="1" stop-color="#5168E3"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10B981"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <!-- Faint dotted grid for the encrypted-data feel -->
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#7C8DF0" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#dots)"/>

  <!-- Decorative encrypted-chunks on the right -->
  <g opacity="0.35" font-family="JetBrains Mono, ui-monospace, monospace" fill="#5168E3">
    <text x="1080" y="80"  font-size="12">0xa8f2…39b1</text>
    <text x="1180" y="120" font-size="12">euint64</text>
    <text x="1080" y="160" font-size="12">FHE.mul()</text>
    <text x="1200" y="200" font-size="12">0x4421…99a4</text>
    <text x="1110" y="240" font-size="12">e3ff…cc02</text>
    <text x="1240" y="280" font-size="12">allowSender</text>
    <text x="1090" y="330" font-size="12">FHE.add()</text>
    <text x="1180" y="380" font-size="12">euint128</text>
    <text x="1090" y="430" font-size="12">decryptForView</text>
  </g>

  <!-- Encrypted-handle motif (faint, large, decorative) — single permit chain -->
  <g opacity="0.18" stroke="#7C8DF0" stroke-width="2" fill="none" stroke-linecap="round">
    <circle cx="1100" cy="100" r="6" fill="#7C8DF0"/>
    <circle cx="1250" cy="170" r="6" fill="#7C8DF0"/>
    <circle cx="1190" cy="290" r="6" fill="#7C8DF0"/>
    <circle cx="1320" cy="360" r="6" fill="#7C8DF0"/>
    <path d="M1100 100 L1250 170 L1190 290 L1320 360"/>
  </g>

  <!-- Shield mark, large -->
  <g transform="translate(80 100) scale(2.5)">
    <path d="M32 4 L56 12 V32 C56 46 45.5 56 32 60 C18.5 56 8 46 8 32 V12 Z" fill="url(#shield)"/>
    <circle cx="32" cy="20" r="3.5" fill="#E0E7FF"/>
    <circle cx="22" cy="38" r="3.5" fill="#E0E7FF"/>
    <circle cx="42" cy="38" r="3.5" fill="#E0E7FF"/>
    <path d="M32 23.5 L22 34.5 M32 23.5 L42 34.5 M22 38 L42 38" stroke="#E0E7FF" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.9"/>
    <circle cx="32" cy="32" r="1.8" fill="#34D399"/>
  </g>

  <!-- Wordmark + tagline -->
  <g font-family="Inter, system-ui, sans-serif" fill="#F6F7F9">
    <text x="280" y="240" font-size="80" font-weight="700" letter-spacing="-2">
      Wage<tspan fill="#7C8DF0">Shield</tspan>
    </text>
    <text x="282" y="295" font-size="28" font-weight="500" fill="#CBD0DB" letter-spacing="-0.3">
      Recover stolen wages. Without revealing who you are.
    </text>
    <!-- Tag chips -->
    <g font-size="14" font-weight="500">
      <!-- Chip 1 -->
      <rect x="282" y="340" width="220" height="34" rx="17" fill="#5168E3" opacity="0.18"/>
      <text x="392" y="362" fill="#7C8DF0" text-anchor="middle">Fhenix CoFHE · encrypted EVM</text>
      <!-- Chip 2 -->
      <rect x="516" y="340" width="200" height="34" rx="17" fill="#5168E3" opacity="0.18"/>
      <text x="616" y="362" fill="#7C8DF0" text-anchor="middle">Privara settlement plugin</text>
      <!-- Chip 3 — green / "live evidence" -->
      <rect x="730" y="340" width="216" height="34" rx="17" fill="#10B981" opacity="0.22"/>
      <text x="838" y="362" fill="#34D399" text-anchor="middle">Live on Arbitrum Sepolia</text>
    </g>
  </g>
</svg>
