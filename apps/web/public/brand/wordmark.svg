<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" role="img" aria-label="WageShield wordmark">
  <title>WageShield</title>
  <!-- Inter, weight 600, -0.01em tracking. We hand-set the glyph sizing so the
       SVG renders identically without depending on the user having Inter installed. -->
  <text
    x="0"
    y="44"
    font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="600"
    font-size="40"
    letter-spacing="-0.5"
    fill="#0F1320"
  >Wage<tspan fill="#5168E3">Shield</tspan></text>
</svg>
